<style>

body { margin:0; overflow:hidden; background:#000; color:white; font-family:'Orbitron'; user-select:none; }

canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }



#ui {

  position: relative;

  z-index: 2;

  padding: 20px;

  display: flex;

  flex-direction: column;

  align-items: center; /* центрирование интерфейса */

}



h1 { text-shadow:0 0 15px white; }

h2 { text-shadow:0 0 10px white; }



/* Filters */

.filters-container {

  display: flex;

  gap: 20px;

  flex-wrap: wrap;

  justify-content: center; /* центрируем фильтры */

  margin-bottom: 15px;

}

.filter-wrapper { 

  display:flex; flex-direction:column; border:2px solid white; border-radius:12px; background:rgba(20,20,20,0.6); padding:10px; max-height:200px; overflow-y:auto; width:220px; 

}

.filter-wrapper h3 { margin:0 0 5px 0; text-align:center; }

.option { margin:5px 0; padding:5px 10px; border:1px solid white; border-radius:8px; cursor:pointer; transition:0.3s; background:rgba(30,30,30,0.6); text-align:center; }

.option.active { background:white; color:black; box-shadow:0 0 10px white; }

.option:hover { background:rgba(50,50,50,0.9); }



/* Cards */

#cardsWrapper { width:80%; max-width:900px; height:300px; margin:20px auto; overflow-y:auto; border:2px solid white; border-radius:12px; backdrop-filter:blur(6px); box-shadow:0 0 15px white; background:rgba(0,0,0,0.4); }

#cards { display:flex; flex-wrap:wrap; justify-content:center; padding:10px; }

.card { width:120px; height:150px; margin:10px; display:flex; align-items:center; justify-content:center; background:rgba(20,20,20,0.8); border:2px solid white; border-radius:12px; backdrop-filter:blur(10px); box-shadow:0 0 10px white; transform:scale(0); animation:pop 0.4s forwards; font-weight:bold; cursor:pointer; text-align:center; transition: transform 0.3s, box-shadow 0.3s, background 0.3s; }

.card:hover { transform:scale(1.15); box-shadow:0 0 25px white; background:rgba(50,50,50,0.9); }

.card.selected { background:white; color:black; transform:scale(1.2); box-shadow:0 0 25px white; }

@keyframes pop { from {transform:scale(0);} to {transform:scale(1);} }



/* Button */

button#selectButton { margin-top:10px; padding:15px 30px; font-size:20px; font-weight:bold; background:rgba(20,20,20,0.7); border:2px solid white; border-radius:12px; backdrop-filter:blur(8px); box-shadow:0 0 10px white; color:white; cursor:pointer; transition:0.3s; }

button#selectButton:hover { box-shadow:0 0 30px white; background:rgba(50,50,50,0.9); }



/* Video */

#myVideoWrapper iframe { width:480px; height:270px; border-radius:12px; border:none; margin-top:20px; }



/* Scrollbars */

.filter-wrapper::-webkit-scrollbar, #cardsWrapper::-webkit-scrollbar { width:8px; }

.filter-wrapper::-webkit-scrollbar-thumb, #cardsWrapper::-webkit-scrollbar-thumb { background:white; border-radius:10px; }



#tips {

  position: fixed;

  bottom: 20px;

  left: 50%;

  transform: translateX(-50%);

  background: rgba(0,0,0,0.7);

  border: 2px solid white;

  border-radius: 12px;

  padding: 10px 20px;

  box-shadow: 0 0 10px white;

  opacity: 0;

  transition: 0.5s;

  pointer-events: none;

}



#tips.show {

  opacity: 1;

}



#finalCard {

  position: fixed;

  top: 50%;

  left: 50%;

  transform: translate(-50%, -50%) scale(0);

  z-index: 999;

  perspective: 1000px;

  pointer-events: none;

}



#finalInner {

  width: 180px;

  height: 220px;

  display:flex;

  align-items:center;

  justify-content:center;

  background: rgba(20,20,20,0.9);

  border:2px solid white;

  border-radius:16px;

  box-shadow:0 0 30px white;

  font-size:22px;

  font-weight:bold;

  transform: rotateY(180deg);

  transition: transform 0.6s ease;

}



/* Появление */

#finalCard.show {

  transform: translate(-50%, -50%) scale(1.4);

  animation: zoomIn 0.4s forwards;

}



@keyframes zoomIn {

  0% { transform: translate(-50%, -50%) scale(0); }

  80% { transform: translate(-50%, -50%) scale(1.5); }

  100% { transform: translate(-50%, -50%) scale(1.2); }

}



/* Переворот */

#finalInner.flip {

  transform: rotateY(0deg);

}



/* ШЕЙК */

@keyframes shake {

  0% { transform: translate(0,0); }

  20% { transform: translate(-5px, 3px); }

  40% { transform: translate(5px, -3px); }

  60% { transform: translate(-4px, 2px); }

  80% { transform: translate(4px, -2px); }

  100% { transform: translate(0,0); }

}



.shake {

  animation: shake 0.4s;

}



.card.final {

  position: fixed;

  top: 50%;

  left: 50%;

  transform: translate(-50%, -50%) rotateY(180deg) scale(1.5);

  z-index: 999;

  transition: transform 0.6s ease;

}



.card.flip {

  transform: translate(-50%, -50%) rotateY(0deg) scale(1.5);

}



@keyframes shake {

  0% { transform: translate(-50%, -50%) rotate(0deg); }

  25% { transform: translate(-48%, -52%) rotate(-2deg); }

  50% { transform: translate(-52%, -48%) rotate(2deg); }

  75% { transform: translate(-49%, -51%) rotate(-1deg); }

  100% { transform: translate(-50%, -50%) rotate(0deg); }

}



.card.shake {

  animation: shake 0.3s ease;

}



</style>

// PARALLAX STARS

let mouseX=0, mouseY=0;

document.addEventListener("mousemove", e => { mouseX=e.clientX; mouseY=e.clientY; });

function createStars(canvasId,count,speed){

  const canvas=document.getElementById(canvasId);

  const ctx=canvas.getContext("2d");

  let w=canvas.width=window.innerWidth;

  let h=canvas.height=window.innerHeight;

  let stars=[];

  for(let i=0;i<count;i++){ stars.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2}); }

  function animate(){

    ctx.clearRect(0,0,w,h);

    const offsetX = (mouseX-w/2)/50;

    const offsetY = (mouseY-h/2)/50;

    for(let s of stars){

      ctx.beginPath();

      ctx.arc(s.x+offsetX,s.y+offsetY,s.r,0,Math.PI*2);

      ctx.fillStyle="white"; ctx.fill();

      s.y -= speed;

      if(s.y < 0){ s.y = h; s.x = Math.random()*w; }

    }

    requestAnimationFrame(animate);

  }

  animate();

  window.addEventListener("resize",()=>{ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; });

}

function getTowerOfTheDay(){

  const today = new Date();



  // уникальное число дня (одинаковое для всех)

  const seed = today.getFullYear() * 1000 + today.getMonth() * 50 + today.getDate();



  // псевдо-рандом на основе даты

  const index = seed % List.length;



  return List[index];

}



function showFinalCardAnimation(possibleTexts){

  const cardsDiv = document.getElementById("cards");

  if(!cardsDiv.children.length) return;



  const cardIndex = Math.floor(Math.random()*cardsDiv.children.length);

  const card = cardsDiv.children[cardIndex];

  const rect = card.getBoundingClientRect();

  const clone = card.cloneNode(true);



  // Клон

  clone.style.position = "fixed";

  clone.style.top = rect.top+"px";

  clone.style.left = rect.left+"px";

  clone.style.margin="0";

  clone.style.transform="rotateY(180deg) scale(1)";

  clone.style.zIndex="999";

  clone.style.transition="none";

  clone.style.display="flex";

  clone.style.alignItems="center";

  clone.style.justifyContent="center";

  clone.style.fontWeight="bold";

  clone.style.fontSize="22px";

  clone.style.background="rgba(20,20,20,0.9)";

  clone.style.border="2px solid white";

  clone.style.borderRadius="16px";

  clone.innerText="?";

  document.body.appendChild(clone);

  card.style.visibility="hidden";



  // Overlay

  let overlay=document.getElementById("screenOverlay");

  if(!overlay){

    overlay=document.createElement("div");

    overlay.id="screenOverlay";

    overlay.style.position="fixed";

    overlay.style.top="0"; overlay.style.left="0";

    overlay.style.width="100%"; overlay.style.height="100%";

    overlay.style.background="rgba(0,0,0,0)";

    overlay.style.zIndex="900";

    overlay.style.transition="background 0.5s";

    document.body.appendChild(overlay);

  }



  // Плавный полёт в центр

  setTimeout(()=>{

    overlay.style.background="rgba(0,0,0,0.6)";

    const centerX = window.innerWidth/2 - rect.width/2;

    const centerY = window.innerHeight/2 - rect.height/2;

    clone.style.transition="all 0.7s ease";

    clone.style.top=centerY+"px";

    clone.style.left=centerX+"px";

    clone.style.transform="rotateY(180deg) scale(1.5)";

  },50);



  // Медленный переворот

  setTimeout(()=>{

    clone.style.transition="transform 0.8s ease";

    clone.style.transform="rotateY(0deg) scale(1.7)";

  },700);



  // Показ текста / пасхалки

  setTimeout(()=>{

    let finalText="?";

    if(possibleTexts && possibleTexts.length){

      finalText = possibleTexts[Math.floor(Math.random()*possibleTexts.length)];

    }

    clone.innerText=finalText;



    // Bounce / shake

    clone.style.transition="transform 0.2s ease";

    clone.style.transform="rotateY(0deg) scale(1.8)";

    setTimeout(()=>{ clone.style.transform="rotateY(0deg) scale(1.7)"; },200);

  },1500);



  // Возврат карточки

  setTimeout(()=>{

    clone.style.transition="all 0.7s ease";

    clone.style.top=rect.top+"px";

    clone.style.left=rect.left+"px";

    clone.style.transform="rotateY(180deg) scale(1)";

    overlay.style.background="rgba(0,0,0,0)";

  },2500);



  // Убираем клон

  setTimeout(()=>{

    clone.remove();

    card.style.visibility="visible";

  },3300);

}

function getType(name){ if(name.startsWith("T")) return "Tower"; if(name.startsWith("S")) return "Steeple"; if(name.startsWith("C")) return "Citadel"; if(name.startsWith("#")) return "Tower Rush";if(name.startsWith("O")) return "Obelisk"; if(name.startsWith("R")) return "Room";return "Another towers"; }



// CREATE FILTERS

function createFilterList(containerId, values){

  const container=document.getElementById(containerId);

  values.forEach(val=>{

    const div=document.createElement("div");

    div.className="option";

    div.innerText=val;

    div.dataset.value=val;

    div.addEventListener("click",()=>{div.classList.toggle("active");});

    container.appendChild(div);

  });

}

createFilterList("fromFilters",[...new Set(List.map(t=>t.from))]);

createFilterList("typeFilters",[...new Set(List.map(t=>getType(t.tower)))]);

createFilterList("scFilters",[...new Set(List.map(t=>t.sc).filter(s=>s))]);



// START SELECTION

// Глобальная переменная для таймера выбора

let selectionInterval = null;



function start(){

  const selectedFrom=[...document.querySelectorAll("#fromFilters .option.active")].map(e=>e.dataset.value);

  const selectedType=[...document.querySelectorAll("#typeFilters .option.active")].map(e=>e.dataset.value);

  const selectedSC=[...document.querySelectorAll("#scFilters .option.active")].map(e=>e.dataset.value);



  const result=document.getElementById("result");

  const cardsDiv=document.getElementById("cards");

  cardsDiv.innerHTML=""; 

  result.innerText="Selecting...";



  // Если ни одна галочка не выбрана во всех фильтрах

  if(selectedFrom.length===0 && selectedType.length===0 && selectedSC.length===0){

    result.innerText="Nothing found, please check filters.";

    return;

  }



  const filtered = List.filter(t=>{

    const type=getType(t.tower);

    let okFrom = selectedFrom.length===0 || selectedFrom.includes(t.from);

    let okType = selectedType.length===0 || selectedType.includes(type);

    let hasSC = !!t.sc;

    let okSC = false;

    if(selectedSC.length===0){ okSC = true; }

    else if(hasSC){ okSC = selectedSC.includes(t.sc); }

    else { okSC = false; }

    return okFrom && okType && okSC;

  });



  if(filtered.length===0){

    result.innerText="Nothing found, please check filters.";

    return;

  }



  const elements = filtered.map(t=>{

    const el=document.createElement("div");

    el.className="card"; 

    el.innerText=t.tower;

    el.addEventListener("click",()=>{

      // Easter Egg check

      easterEggs.forEach(e=>{

        if(Math.random()<e.chance){

          document.getElementById("myVideoPlayer").src=e.video;

        }

      });

    });

    cardsDiv.appendChild(el); 

    return el;

  });



  // Очищаем предыдущий интервал, если он есть

  if(selectionInterval) clearInterval(selectionInterval);



  // Анимация выбора

  let i=0;

  let current = 0;

  selectionInterval = setInterval(()=>{

    elements.forEach(e=>e.classList.remove('selected'));

    current = Math.floor(Math.random()*elements.length);

    elements[current].classList.add('selected');

    i++;



    if(i>30){

      clearInterval(selectionInterval); // ✅ здесь правильная очистка



      const selectedText = elements[current].innerText;



      result.innerText="🎯 Selected: " + selectedText;



      showFinalCard(selectedText);

    }

  },100);

}
