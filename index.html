<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EToH Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  overflow:hidden;
  background:#000;
  color:white;
  font-family:'Orbitron';
  text-align:center;
  user-select: none;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

#ui { position:relative; z-index:2; }

select, button {
  margin:10px;
  padding:12px 18px;
  background:rgba(20,20,20,0.6);
  color:white;
  border:2px solid white;
  border-radius:12px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 10px white;
  transition:0.3s;
  cursor:pointer;
}

select:hover, button:hover {
  box-shadow:0 0 25px white;
}

#cardsWrapper {
  width:80%;
  max-width:900px;
  height:300px;
  margin:20px auto;
  overflow-y:auto;
  border:2px solid white;
  border-radius:12px;
  backdrop-filter:blur(6px);
  box-shadow:0 0 15px white;
  background:rgba(0,0,0,0.4);
}

#cardsWrapper::-webkit-scrollbar {
  width:8px;
}
#cardsWrapper::-webkit-scrollbar-thumb {
  background:white;
  border-radius:10px;
}

#cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:10px;
}

.card {
  width:120px;
  height:150px;
  margin:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(20,20,20,0.8);
  border:2px solid white;
  border-radius:12px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 10px white;
  transform:scale(0);
  animation:pop 0.4s forwards;
  font-weight:bold;
  cursor:pointer;
  text-align:center;
}

.card.selected {
  background:white;
  color:black;
  transform:scale(1.2);
  box-shadow:0 0 25px white;
}

@keyframes pop {
  from {transform:scale(0);}
  to {transform:scale(1);}
}

h1 { text-shadow:0 0 15px white; }
#result { margin-top:15px; font-size:20px; text-shadow:0 0 10px white; }

#myVideoWrapper iframe {
  width:320px;
  height:180px;
  border-radius:12px;
  border:none;
}
</style>
</head>

<body>

<canvas id="stars1"></canvas>
<canvas id="stars2"></canvas>
<canvas id="stars3"></canvas>

<div id="ui">
<h1>🌌 EToH Assistant</h1>

<select id="fromSelect"></select>
<select id="typeSelect">
  <option value="All">Every type</option>
  <option value="Tower">Tower</option>
  <option value="Steeple">Steeple</option>
  <option value="Citadel">Citadel</option>
</select>
<select id="scSelect">
  <option value="All">All towers (SC + not SC)</option>
  <option value="SC">Only SC</option>
  <option value="NonSC">Only not SC</option>
</select>

<br>
<button onclick="start()">🎴 Select</button>

<div id="cardsWrapper">
  <div id="cards"></div>
</div>

<h2 id="result"></h2>

<h2>🎬Site Show</h2>
<div id="myVideoWrapper">
  <iframe id="myVideoPlayer" src="https://www.youtube.com/embed/nj3CE2Y5dYE?autoplay=0" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

// 🌌 PARALLAX STARS
function createStars(canvasId, count, speed){
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;

  let stars = [];
  for(let i=0;i<count;i++){
    stars.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2});
  }

  function animate(){
    ctx.clearRect(0,0,w,h);
    for(let s of stars){
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle="white";
      ctx.fill();
      s.y -= speed;
      if(s.y < 0){ s.y = h; s.x = Math.random()*w; }
    }
    requestAnimationFrame(animate);
  }

  animate();
  window.addEventListener("resize",()=>{
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  });
}

createStars("stars1",50,0.2);
createStars("stars2",40,0.5);
createStars("stars3",30,1);

// Easter eggs
const easterEggs = [
  { text:"Rickroll!", chance:0.05, video:"https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0&autoplay=1" },
  { text:"You found a secret!", chance:0.02, video:"https://www.youtube.com/embed/dQw4w9WgXcQ" },
  { text:"Репчик" , chance:o.o1, video:"https://www.youtube.com/embed/OAva7ttQiYg" },
  { text:"LOL Surprise!", chance:0.03 }
];

function getType(name){
  if(name.startsWith("T")) return "Tower";
  if(name.startsWith("S")) return "Steeple";
  if(name.startsWith("C")) return "Citadel";
}

// FROM select
const fromSelect = document.getElementById('fromSelect');
const fromList = [...new Set(List.map(t=>t.from))];
fromSelect.innerHTML = `<option value="All">Every world</option>`;
fromList.forEach(f=>{
  const opt = document.createElement('option');
  opt.value = f;
  opt.innerText = f;
  fromSelect.appendChild(opt);
});

// ----------- SELECT TOWERS -----------
function start(){
  const from = fromSelect.value;
  const type = document.getElementById('typeSelect').value;
  const scFilter = document.getElementById('scSelect').value;

  const filtered = List.filter(t => {
    const tType = getType(t.tower);
    const isSC = !!t.sc;

    const fromOk = (from==="All" || t.from===from);
    const typeOk = (type==="All" || tType===type);

    let scOk = false;
    if(scFilter==="All") scOk = true;
    if(scFilter==="SC") scOk = isSC;
    if(scFilter==="NonSC") scOk = !isSC;

    return fromOk && typeOk && scOk;
  });

  const cardsDiv = document.getElementById('cards');
  const result = document.getElementById('result');

  cardsDiv.innerHTML="";
  result.innerText="Selecting...";

  if(filtered.length===0){ result.innerText="No towers found, try resetting filters."; return; }

  const elements = filtered.map(t=>{
    const el = document.createElement('div');
    el.className="card";
    el.innerText = t.tower;
    cardsDiv.appendChild(el);

    // Easter egg on click
    el.addEventListener("click",(e)=>{
      e.preventDefault();
      easterEggs.forEach(egg=>{
        if(Math.random()<egg.chance){
          result.innerText = "🎉 Easter egg: " + egg.text;
          if(egg.video){
            const rickPlayer = document.getElementById("myVideoPlayer");
            rickPlayer.src = egg.video;
          }
        }
      });
    });

    return el;
  });

  let i=0, current=0;
  const anim = setInterval(()=>{
    elements.forEach(e=>e.classList.remove('selected'));
    current = Math.floor(Math.random()*elements.length);
    elements[current].classList.add('selected');
    i++;
    if(i>30){ clearInterval(anim); result.innerText="🎯 Selected: " + elements[current].innerText; }
  },100);
}
</script>
